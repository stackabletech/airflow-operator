---
apiVersion: airflow.stackable.tech/v1alpha1
kind: AirflowCluster
metadata:
  name: airflow
spec:
  image:
    productVersion: 3.1.6
  clusterConfig:
    credentialsSecret: airflow-admin-credentials
    metadataDatabase:
      postgresql:
        host: airflow-postgresql
        database: airflow
        credentialsSecret: airflow-postgresql-credentials
    volumes:
      - name: cm-dag # <3>
        configMap:
          name: cm-dag # <4>
    volumeMounts:
      - name: cm-dag # <5>
        mountPath: /dags/test_airflow_dag.py # <6>
        subPath: test_airflow_dag.py # <7>
  webservers:
    roleConfig:
      listenerClass: external-unstable
    roleGroups:
      default:
        envOverrides:
          AIRFLOW__CORE__DAGS_FOLDER: "/dags" # <8>
        replicas: 1
  celeryExecutors:
    # ...
