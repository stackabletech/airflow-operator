#
# These tests can run against an OpenShift cluster, provided you perform the following
# steps manually before starting them with scripts/run_tests.sh
#
# 1. Set the "openshift" dimension below to "true" (with quotes)
---
dimensions:
  - name: airflow
    values:
      - 2.9.3
      - 3.0.6
      - 3.1.6
      - 3.2.2
      # To use a custom image, add a comma and the full name after the product version
      # - x.x.x,oci.stackable.tech/sandbox/airflow:x.x.x-stackable0.0.0-dev
  - name: airflow-latest
    values:
      - 3.2.2
      # To use a custom image, add a comma and the full name after the product version
      # - x.x.x,oci.stackable.tech/sandbox/airflow:x.x.x-stackable0.0.0-dev
  - name: opa-latest
    values:
      - 1.16.2
  - name: ldap-authentication
    values:
      - no-tls
      - insecure-tls
      - server-verification-tls
  - name: openshift
    values:
      - "false"
  - name: executor
    values:
      - celery
      - kubernetes
  - name: access
    values:
      - https
      - ssh
  - name: openlineage-use-tls
    values:
      - "false"
      - "true"
  - name: openlineage-use-auth
    values:
      - "false"
      - "true"
tests:
  - name: smoke
    dimensions:
      - airflow
      - openshift
      - executor
  - name: mount-dags-configmap
    dimensions:
      - airflow-latest
      - openshift
      - executor
  - name: mount-dags-gitsync
    dimensions:
      - airflow-latest
      - openshift
      - executor
      - access
  - name: ldap
    dimensions:
      - airflow-latest
      - openshift
      - ldap-authentication
      - executor
  - name: oidc
    dimensions:
      - airflow-latest
      - openshift
  - name: opa
    dimensions:
      - airflow
      - opa-latest
      - openshift
  - name: opa-interop
    dimensions:
      - airflow-latest
      - opa-latest
      - openshift
  - name: resources
    dimensions:
      - airflow-latest
      - openshift
  - name: orphaned-resources
    dimensions:
      - airflow-latest
      - openshift
  - name: logging
    dimensions:
      - airflow
      - openshift
      - executor
  - name: cluster-operation
    dimensions:
      - airflow-latest
      - openshift
  - name: overrides
    dimensions:
      - airflow-latest
      - openshift
  - name: external-access
    dimensions:
      - airflow
      - openshift
      - executor
  - name: triggerer
    dimensions:
      - airflow-latest
      - openshift
      - executor
  - name: remote-logging
    dimensions:
      - airflow-latest
      - openshift
      - executor
  - name: versioning
    dimensions:
      - airflow-latest
      - openshift
  - name: ca-cert
    dimensions:
      - airflow-latest
      - openshift
  - name: openlineage
    dimensions:
      - airflow-latest
      - openshift
      - executor
      - openlineage-use-tls
      - openlineage-use-auth
suites:
  - name: nightly
    # Run nightly with the latest airflow
    patch:
      - dimensions:
          - name: airflow
            expr: last
  - name: smoke-latest
    # Useful for development
    select:
      - smoke
    patch:
      - dimensions:
          - expr: last
  - name: openshift
    # Run on OpenShift with latest airflow
    patch:
      - dimensions:
          - expr: last
      - dimensions:
          - name: airflow
            expr: last
          - name: openshift
            expr: "true"
